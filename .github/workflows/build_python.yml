name: "Build, Test, and Package: Python"

on:
  push:
    paths:
      - "Solutions/Python/link-extractor/**"
  pull_request:
    paths:
      - "Solutions/Python/link-extractor/**"
  workflow_dispatch:
    inputs:
      bump_version:
        description: "Bump version (manual trigger)"
        required: false
        default: false
        type: boolean

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

  install-dependencies:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          cd Solutions/Python/link-extractor
          poetry install

  lint:
    needs: install-dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Lint
        run: ./Scripts/Bash/Python/python_lint.sh

  test:
    needs: install-dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Run Tests
        run: ./Scripts/Bash/Python/python_test.sh

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Build Package
        run: ./Scripts/Bash/Python/python_build.sh

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v3
        with:
          name: link-extractor-package
          path: Solutions/Python/link-extractor/dist/

  bump-version:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: |
          cd Solutions/Python/link-extractor
          poetry install

      - name: Bump Version
        run: |
          cd Solutions/Python/link-extractor
          poetry version patch

  create-release:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Determine Version
        id: version
        run: |
          cd Solutions/Python/link-extractor
          VERSION=$(poetry version -s)
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Create Release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ env.version }}
          release_name: Release v${{ env.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: Solutions/Python/link-extractor/dist/*
          asset_name: link-extractor-v${{ env.version }}.tar.gz
          asset_content_type: application/gzip
