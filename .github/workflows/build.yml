name: Build and Release

on:
  workflow_dispatch:
    inputs:
      bump_version_part:
        description: "Which part of the version to bump (major, minor, patch)"
        required: false
        default: "patch"
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build .NET Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release

      - name: Save Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: ./MyApp/bin/Release/net6.0/

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0

      - name: Restore Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts

      - name: Run Tests
        run: dotnet test --no-build --verbosity normal

  version-bump:
    name: Bump Version in .csproj
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Version Bump Script
        run: |
          chmod +x ./scripts/bump-version.sh
          ./scripts/bump-version.sh ./MyApp/MyApp.csproj

      - name: Commit Version Bump
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add ./MyApp/MyApp.csproj
          git commit -m "Bump version in .csproj"
          git push origin main

  package:
    name: Package .NET Application
    runs-on: ubuntu-latest
    needs: version-bump
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 6.0

      - name: Package Application
        run: dotnet publish ./MyApp/MyApp.csproj --configuration Release --output ./publish

      - name: Save Published Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: published-app
          path: ./publish

  docker-build:
    name: Build Docker Image with BuildKit
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Restore Published Artifacts
        uses: actions/download-artifact@v3
        with:
          name: published-app

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker Layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker Image
        run: |
          docker buildx build \
            --tag my-app:${{ github.sha }} \
            --cache-to=type=inline \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --output type=docker \
            .

  helm-validate:
    name: Validate and Package Helm Chart
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Lint Helm Chart
        run: helm lint ./helm-chart

      - name: Package Helm Chart
        run: helm package ./helm-chart --destination ./helm-packages

      - name: Save Helm Packages
        uses: actions/upload-artifact@v3
        with:
          name: helm-packages
          path: ./helm-packages
