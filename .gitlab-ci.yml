stages:
  - build
  - test
  - package
  - docker

variables:
  DOTNET_VERSION: "8.0" # Specify the .NET version to use
  OUTPUT_DIR: "output"
  DOCKER_IMAGE: "registry.example.com/link-extractor" # Replace with your Docker image registry and name

before_script:
  - echo "Using .NET version $DOTNET_VERSION"
  - dotnet --version

build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:$DOTNET_VERSION
  script:
    - dotnet restore
    - dotnet build --configuration Release
  artifacts:
    paths:
      - bin/
    expire_in: 1 week

test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:$DOTNET_VERSION
  script:
    - dotnet test --no-build --verbosity normal
  dependencies:
    - build

package:
  stage: package
  image: mcr.microsoft.com/dotnet/sdk:$DOTNET_VERSION
  script:
    - mkdir -p $OUTPUT_DIR
    - dotnet publish -c Release -o $OUTPUT_DIR
  artifacts:
    paths:
      - $OUTPUT_DIR/
    expire_in: 1 week

docker-build:
  stage: docker
  image: docker:20.10
  services:
    - docker:20.10-dind
  rules:
    - changes:
        - Dockerfile
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_REF_SLUG .
    - docker push $DOCKER_IMAGE:$CI_COMMIT_REF_SLUG
  only:
    - main
    - develop
